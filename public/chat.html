<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amravati Sahayak — Chat</title>
    <script>
      (function () {
        var t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/chat.css" />
    <link rel="stylesheet" href="/css/maps.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar-controls">
        <label for="langSelect" data-i18n="language">Language</label>
        <select id="langSelect" aria-label="Language">
          <option value="en">English</option>
          <option value="hi">हिंदी</option>
          <option value="mr">मराठी</option>
        </select>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <div class="chat-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span aria-hidden="true">📜</span>
          <h2 data-i18n="history">History</h2>
        </div>
        <button type="button" class="btn btn-primary btn-new-chat" id="newChatBtn" data-i18n="newChat">+ New chat</button>
        <div class="history-list" id="historyList"></div>
        <div class="sidebar-actions">
          <button type="button" class="btn btn-secondary" id="settingsBtn" data-i18n="settings">
            Settings
          </button>
          <button type="button" class="btn btn-ghost" id="logoutBtn" data-i18n="logout">Log out</button>
        </div>
      </aside>

      <section class="chat-main">
        <header class="chat-header">
          <button type="button" class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
          <div>
            <h1 id="chatTitle">Chat with Sahayak</h1>
            <p class="subtitle" data-i18n="yourGuide">Your Amravati guide</p>
          </div>
          <button type="button" class="btn btn-ghost" id="voiceToggle" aria-pressed="true" aria-label="Voice replies on">
            🔊
          </button>
        </header>

        <div class="messages" id="messages" role="log" aria-live="polite"></div>

        <div class="quick-search-container hidden" id="quickSearchContainer">
          <div class="quick-search-label" data-i18n="quickSearch">Quick search</div>
          <div class="quick-search-buttons">
            <button type="button" class="quick-search-btn" id="searchHospitals" title="Hospitals" aria-label="Search hospitals">
              🏥 <span data-i18n="hospitals">Hospitals</span>
            </button>
            <button type="button" class="quick-search-btn" id="searchCafes" title="Cafes" aria-label="Search cafes">
              ☕ <span data-i18n="cafes">Cafes</span>
            </button>
            <button type="button" class="quick-search-btn" id="searchVegRestaurants" title="Veg Restaurants" aria-label="Search vegetarian restaurants">
              🥗 <span data-i18n="vegRestaurants">Veg Restaurants</span>
            </button>
            <button type="button" class="quick-search-btn" id="searchTouristPlaces" title="Tourist Places" aria-label="Search tourist places">
              🏛️ <span data-i18n="touristPlaces">Tourist Places</span>
            </button>
            <button type="button" class="quick-search-btn" id="searchHotels" title="Hotels" aria-label="Search hotels">
              🏨 <span data-i18n="hotels">Hotels</span>
            </button>
          </div>
        </div>

        <div class="input-bar">
          <button type="button" class="icon-btn" id="micBtn" title="Voice input" aria-label="Voice input">
            🎤
          </button>
          <input
            type="text"
            id="messageInput"
            data-i18n-placeholder="typeMessage"
            placeholder="Ask about places or events…"
            autocomplete="off"
          />
          <button type="button" class="btn btn-primary" id="sendBtn" data-i18n="send">Send</button>
        </div>
      </section>
    </div>

    <!-- Settings modal -->
    <div class="modal-overlay hidden" id="settingsModal">
      <div class="modal" role="dialog" aria-labelledby="settingsTitle">
        <h3 id="settingsTitle" data-i18n="settings">Settings</h3>
        <button type="button" class="btn btn-secondary" id="changeAssistantBtn" data-i18n="changeAssistant">
          Change assistant name
        </button>
        <button type="button" class="btn btn-secondary" id="changeUsernameBtn" data-i18n="changeUsername">
          Change username
        </button>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close="settingsModal" data-i18n="cancel">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- Assistant name modal -->
    <div class="modal-overlay hidden" id="assistantModal">
      <div class="modal" role="dialog">
        <h3 data-i18n="changeAssistant">Change assistant name</h3>
        <div class="form-group">
          <label for="assistantNameInput" data-i18n="newAssistantName">Assistant name</label>
          <input type="text" id="assistantNameInput" maxlength="32" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close="assistantModal" data-i18n="cancel">
            Cancel
          </button>
          <button type="button" class="btn btn-primary" id="saveAssistant" data-i18n="save">Save</button>
        </div>
      </div>
    </div>

    <!-- Username modal -->
    <div class="modal-overlay hidden" id="usernameModal">
      <div class="modal" role="dialog">
        <h3 data-i18n="changeUsername">Change username</h3>
        <div class="form-group">
          <label for="usernameInput" data-i18n="newUsername">Username</label>
          <input type="text" id="usernameInput" maxlength="48" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close="usernameModal" data-i18n="cancel">
            Cancel
          </button>
          <button type="button" class="btn btn-primary" id="saveUsername" data-i18n="save">Save</button>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="/js/chat.js"></script>
  </body>
</html>
